# docker compose up -d
services:
  mariadb:
    image: mariadb:latest
    container_name: voyager-mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: voyager-project
      MARIADB_USER: voyager-project
      MARIADB_PASSWORD: voyager-project
      MARIADB_DATABASE: voyager-project
    volumes:
      - mariadb_data:/var/lib/mysql

  game-server:
    build:
      context: ../
      dockerfile: docker/server/Dockerfile
    container_name: voyager-game
    ports:
      - "25565:25565"
    depends_on:
      - mariadb
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: voyager-project
      DB_USER: voyager-project
      DB_PASSWORD: voyager-project

volumes:
  mariadb_data:
